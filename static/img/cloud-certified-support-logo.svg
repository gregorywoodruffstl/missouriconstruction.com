<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 150" width="400" height="150">
  <!-- Background -->
  <rect width="400" height="150" fill="#0078D4" rx="10"/>

  <!-- Cloud shape -->
  <g transform="translate(22, 38)">
    <ellipse cx="38" cy="42" rx="18" ry="16" fill="white" opacity="0.95"/>
    <ellipse cx="58" cy="34" rx="22" ry="20" fill="white" opacity="0.95"/>
    <ellipse cx="78" cy="40" rx="16" ry="14" fill="white" opacity="0.95"/>
    <rect x="20" y="42" width="74" height="18" fill="white" opacity="0.95" rx="2"/>
  </g>

  <!-- Checkmark / certified badge overlay on cloud -->
  <g transform="translate(52, 56)">
    <circle cx="16" cy="16" r="13" fill="#0078D4" opacity="0.85"/>
    <polyline points="9,16 14,22 23,10" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Company name -->
  <text x="130" y="62" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="white" letter-spacing="0.5">Cloud Certified</text>
  <text x="130" y="92" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="white" letter-spacing="0.5">Support Inc.</text>

  <!-- Tagline -->
  <text x="130" y="120" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#BFE3FF" letter-spacing="1.2" font-weight="400">AI · CLOUD · COMMUNITY</text>
</svg>
