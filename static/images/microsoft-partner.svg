<svg xmlns="http://www.w3.org/2000/svg" width="200" height="56" viewBox="0 0 200 56" role="img" aria-label="Microsoft Partner">
  <!-- Background -->
  <rect width="200" height="56" rx="4" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
  <!-- Microsoft 4-square logo -->
  <rect x="10" y="10.5" width="15" height="15" fill="#F25022"/>
  <rect x="27" y="10.5" width="15" height="15" fill="#7FBA00"/>
  <rect x="10" y="27.5" width="15" height="15" fill="#00A4EF"/>
  <rect x="27" y="27.5" width="15" height="15" fill="#FFB900"/>
  <!-- Microsoft text -->
  <text x="51" y="24" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#737373" letter-spacing="0.3">Microsoft</text>
  <!-- Partner text -->
  <text x="51" y="41" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" fill="#0078D4" letter-spacing="0.2">Partner</text>
</svg>
